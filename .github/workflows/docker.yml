name: Build and Push

on:
    push:
        branches: [main, master]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ghcr.io/quintilis-server/gateway
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Checkout gateway
              uses: actions/checkout@v4
              with:
                  path: gateway
            
            - name: Checkout common
              uses: actions/checkout@v4
              with:
                  repository: Quintilis-Server/common
                  path: common
                  token: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Login no GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Build e Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  file: gateway/Dockerfile
                  tags: |
                      ghcr.io/quintilis-server/gateway:latest
                      ghcr.io/quintilis-server/gateway:${{ github.sha }}
